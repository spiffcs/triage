version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major: 30
      semver-minor: 7
      semver-patch: 3
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major: 30
      semver-minor: 7
      semver-patch: 3
    commit-message:
      prefix: "chore(deps)"
